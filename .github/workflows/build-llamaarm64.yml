name: Build llama-server linux-arm64

# Run manually when you want to update the arm64 llama binary on PHOBOS-DEPS.
# Cross-compiles llama-server AND all required shared libs (.so) for linux-arm64
# on a standard ubuntu-latest (x64) runner — no paid arm64 runner required.
#
# Output: llama-b{version}-linux-arm64.tar.gz  (matches upstream tarball structure)
# Upload to PHOBOS-DEPS after downloading the artifact.

on:
  workflow_dispatch:
    inputs:
      llama_version:
        description: 'llama.cpp version tag (e.g. b8989). Leave blank to use bin-manifest.json.'
        required: false
        default: ''

jobs:
  build-llama-arm64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read pinned llama version
        id: pins
        run: |
          if [ -n "${{ github.event.inputs.llama_version }}" ]; then
            VER="${{ github.event.inputs.llama_version }}"
          else
            VER=$(node -e "const m=require('./scripts/bin-manifest.json'); console.log(m['linux-x64']?.llama ?? '')")
          fi
          echo "LLAMA_VERSION=$VER" >> $GITHUB_OUTPUT
          echo "Using version: $VER"

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git ninja-build \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Clone llama.cpp at pinned version
        run: |
          git clone https://github.com/ggml-org/llama.cpp llama-src
          VERSION="${{ steps.pins.outputs.LLAMA_VERSION }}"
          [ -n "$VERSION" ] && (cd llama-src && git checkout "$VERSION")
          echo "Building: $(cd llama-src && git describe --tags --always)"

      - name: Build llama-server + shared libs (cross-compile aarch64)
        run: |
          cd llama-src
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DGGML_NATIVE=OFF \
            -DBUILD_SHARED_LIBS=ON
          cmake --build build -j$(nproc)

      - name: Package tar.gz matching upstream structure
        run: |
          VERSION="${{ steps.pins.outputs.LLAMA_VERSION }}"
          DIR="llama-${VERSION}"
          mkdir -p "staging/$DIR"
          cp llama-src/build/bin/llama-server "staging/$DIR/"
          chmod +x "staging/$DIR/llama-server"
          find llama-src/build -name "*.so*" -type f -exec cp {} "staging/$DIR/" \;
          echo "=== Contents ===" && ls -lh "staging/$DIR/"
          echo "=== Binary check ===" && file "staging/$DIR/llama-server"
          tar -czf "staging/llama-${VERSION}-linux-arm64.tar.gz" -C staging "$DIR"
          ls -lh "staging/llama-${VERSION}-linux-arm64.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-linux-arm64-${{ steps.pins.outputs.LLAMA_VERSION }}
          path: staging/llama-${{ steps.pins.outputs.LLAMA_VERSION }}-linux-arm64.tar.gz
          retention-days: 30