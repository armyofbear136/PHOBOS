name: Build All Platforms

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub Release after build'
        type: boolean
        default: false

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - label:        win32-x64
            runner:       windows-latest
            artifact:     phobos-win32-x64
            pack:         zip
            fetch-script: scripts/fetch-win32-x64.js

          - label:        darwin-arm64
            runner:       macos-14
            artifact:     phobos-darwin-arm64
            pack:         tar
            fetch-script: scripts/fetch-darwin-arm64.js

          - label:        linux-x64
            runner:       ubuntu-latest
            artifact:     phobos-linux-x64
            pack:         tar
            fetch-script: scripts/fetch-linux-x64.js

          - label:        linux-arm64
            runner:       ubuntu-24.04-arm
            artifact:     phobos-linux-arm64
            pack:         tar
            fetch-script: scripts/fetch-linux-arm64.js

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Restore distutils (macOS)
        if: runner.os == 'macOS'
        run: pip3 install setuptools --break-system-packages

      - name: Install dependencies
        run: npm ci --foreground-scripts

      - name: Read version
        id: version
        run: node -e "import('./version.js').then(m => console.log('CORE_VERSION=' + m.CORE_VERSION))" >> $GITHUB_OUTPUT
        shell: bash

      - name: Fetch llama.cpp binaries
        run: node ${{ matrix.fetch-script }}

      - name: Build
        run: node build.js
        env:
          PHOBOS_LICENSE_SEED: ${{ secrets.PHOBOS_LICENSE_SEED }}

      - name: Package (tar)
        if: matrix.pack == 'tar'
        run: tar -czf ${{ matrix.artifact }}-${{ steps.version.outputs.CORE_VERSION }}.tar.gz -C dist .

      - name: Package (zip)
        if: matrix.pack == 'zip'
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath ${{ matrix.artifact }}-${{ steps.version.outputs.CORE_VERSION }}.zip

      - name: Upload artifact (tar)
        if: matrix.pack == 'tar'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ steps.version.outputs.CORE_VERSION }}
          path: ${{ matrix.artifact }}-${{ steps.version.outputs.CORE_VERSION }}.tar.gz
          retention-days: 7

      - name: Upload artifact (zip)
        if: matrix.pack == 'zip'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ steps.version.outputs.CORE_VERSION }}
          path: ${{ matrix.artifact }}-${{ steps.version.outputs.CORE_VERSION }}.zip
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (github.event_name == 'workflow_dispatch' && inputs.release))
    permissions:
      contents: write

    steps:
      - name: Download all available artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ github.ref_name }}
          name:                   PHOBOS ${{ github.ref_name }}
          draft:                  false
          prerelease:             false
          generate_release_notes: true
          files:                  release-artifacts/**/*.{tar.gz,zip}
          fail_on_unmatched_files: false
