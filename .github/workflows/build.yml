name: Build All Platforms

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub Release after build'
        type: boolean
        default: false

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - label:             win32-x64
            runner:            windows-latest
            artifact:          phobos-win32-x64
            pack:              zip
            build-full-target: win32-x64
            skip-electron:     false

          - label:             darwin-arm64
            runner:            macos-14
            artifact:          phobos-darwin-arm64
            pack:              tar
            build-full-target: darwin-arm64
            skip-electron:     false

          - label:             linux-x64
            runner:            ubuntu-latest
            artifact:          phobos-linux-x64
            pack:              tar
            build-full-target: linux-x64
            skip-electron:     false

          - label:             linux-arm64
            runner:            ubuntu-24.04-arm
            artifact:          phobos-linux-arm64
            pack:              tar
            build-full-target: linux-arm64
            skip-electron:     true

    steps:
      - uses: actions/checkout@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Restore distutils (macOS)
        if: runner.os == 'macOS'
        run: pip3 install setuptools --break-system-packages

      - name: Install dependencies
        run: npm ci --foreground-scripts

      - name: Cache app/node_modules
        uses: actions/cache@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: app/node_modules
          key: app-node-modules-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: app-node-modules-${{ runner.os }}-

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(node -e "const fs=require('fs'); const m=fs.readFileSync('version.ts','utf8').match(/CORE_VERSION\s*=\s*'([^']+)'/); console.log('CORE_VERSION='+m[1]);")
          echo "$VERSION" >> $GITHUB_OUTPUT

      - name: Read pinned binary versions from manifest
        id: pins
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('scripts/bin-manifest.json', 'utf8'));
            const t = '${{ matrix.build-full-target }}';
            const llama = m[t]?.llama || '';
            const sd = m[t]?.sd || '';
            console.log('LLAMA_VERSION=' + llama);
            console.log('SD_VERSION=' + sd);
            if (llama) console.error('📌 Pinned llama.cpp: ' + llama);
            else       console.error('⚠️  No pinned llama.cpp version — will fetch latest');
            if (sd)    console.error('📌 Pinned sd.cpp: ' + sd);
            else       console.error('⚠️  No pinned sd.cpp version — will fetch latest');
          " >> $GITHUB_OUTPUT

      - name: Enable Developer Mode (Windows — required for electron-builder symlinks)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /t REG_DWORD /f /v AllowDevelopmentWithoutDevLicense /d 1

      # build.js flags:
      #   --full-app        → two-pass electron build, stages PHOBOS-app-*.exe to dist/
      #   --no-app          → skip electron entirely (linux-arm64 has no electron target)
      #   --no-deps-backup  → never copy dist-deps-backup/ in CI (it doesn't exist anyway,
      #                       but this makes the intent explicit and future-proof)
      - name: Build phobos-core
        run: node build.js ${{ matrix.skip-electron == 'true' && '--no-app' || '--full-app' }} --no-deps-backup
        env:
          PHOBOS_LICENSE_SEED:         ${{ secrets.PHOBOS_LICENSE_SEED }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK:                    ''
          WIN_CSC_LINK:                ''

      - name: Build phobos-lite
        run: node scripts/build-lite.js ${{ matrix.build-full-target }}
        continue-on-error: true

      - name: Write version.txt
        shell: bash
        run: echo "${{ steps.version.outputs.CORE_VERSION }}" > dist/version.txt

      - name: Package dist (tar)
        if: matrix.pack == 'tar'
        run: tar -czf ${{ matrix.artifact }}-${{ steps.version.outputs.CORE_VERSION }}.tar.gz -C dist .

      - name: Package dist (zip)
        if: matrix.pack == 'zip'
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath "${{ matrix.artifact }}-${{ steps.version.outputs.CORE_VERSION }}.zip"

      - name: Upload dist artifact (tar)
        if: matrix.pack == 'tar'
        uses: actions/upload-artifact@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: ${{ matrix.artifact }}-${{ steps.version.outputs.CORE_VERSION }}
          path: ${{ matrix.artifact }}-${{ steps.version.outputs.CORE_VERSION }}.tar.gz
          retention-days: 7

      - name: Upload dist artifact (zip)
        if: matrix.pack == 'zip'
        uses: actions/upload-artifact@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: ${{ matrix.artifact }}-${{ steps.version.outputs.CORE_VERSION }}
          path: ${{ matrix.artifact }}-${{ steps.version.outputs.CORE_VERSION }}.zip
          retention-days: 7

      - name: Upload phobos-lite artifact
        if: hashFiles('dist-lite/*.zip') != ''
        uses: actions/upload-artifact@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: phobos-lite-${{ matrix.build-full-target }}-${{ steps.version.outputs.CORE_VERSION }}
          path: dist-lite/*.zip
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (github.event_name == 'workflow_dispatch' && inputs.release))
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: release-artifacts
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ github.ref_name }}
          name:                   PHOBOS ${{ github.ref_name }}
          draft:                  false
          prerelease:             false
          generate_release_notes: true
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.zip
          fail_on_unmatched_files: false