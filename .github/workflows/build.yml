# .github/workflows/build.yml
# Builds phobos-core for all supported platforms and assembles a GitHub Release.
#
# Triggered by:
#   - Tag push matching v* (builds all platforms + creates Release)
#   - Manual dispatch via GitHub UI or: gh workflow run build.yml
#
# To release: git tag v1.0.0 && git push origin v1.0.0
# To build without releasing: workflow_dispatch (no tag)

name: Build All Platforms

on:
  push:
    tags: ['v*']          # only tags, NOT branch pushes — prevents infinite loop
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub Release after build'
        type: boolean
        default: false

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    # Don't cancel other platforms if one fails
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - label:    win32-x64
            runner:   windows-latest
            artifact: phobos-win32-x64
            ext:      .exe
            pack:     zip

          # Windows ARM64 — requires GitHub Team/Enterprise.
          # Remove this block if on the free plan.
          - label:    win32-arm64
            runner:   windows-11-arm
            artifact: phobos-win32-arm64
            ext:      .exe
            pack:     zip

          - label:    darwin-x64
            runner:   macos-13          # pinned Intel runner — free on all plans
            artifact: phobos-darwin-x64
            ext:      ""
            pack:     tar

          - label:    darwin-arm64
            runner:   macos-latest      # Apple Silicon (M1/M2)
            artifact: phobos-darwin-arm64
            ext:      ""
            pack:     tar

          - label:    linux-x64
            runner:   ubuntu-latest
            artifact: phobos-linux-x64
            ext:      ""
            pack:     tar

          - label:    linux-arm64
            runner:   ubuntu-24.04-arm
            artifact: phobos-linux-arm64
            ext:      ""
            pack:     tar

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: node build.js

      - name: Package (tar)
        if: matrix.pack == 'tar'
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Package (zip)
        if: matrix.pack == 'zip'
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact (tar)
        if: matrix.pack == 'tar'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          retention-days: 7

      - name: Upload artifact (zip)
        if: matrix.pack == 'zip'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          retention-days: 7

  # ── Release ─────────────────────────────────────────────────────────────────
  # Runs after all build jobs finish (even if some failed).
  # Attaches whichever artifacts were successfully produced to a GitHub Release.
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    # Run when triggered by a tag push, or manual dispatch with release=true.
    # 'always()' means this job runs even if some build jobs failed/were skipped.
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (github.event_name == 'workflow_dispatch' && inputs.release))
    permissions:
      contents: write

    steps:
      - name: Download all available artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
        # continue even if no artifacts were produced (shouldn't happen, but safe)
        continue-on-error: true

      - name: List artifacts
        run: |
          echo "Artifacts collected:"
          find release-artifacts -type f | sort || echo "(none)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ github.ref_name }}
          name:                   PHOBOS ${{ github.ref_name }}
          draft:                  false
          prerelease:             false
          generate_release_notes: true
          # Glob picks up all .tar.gz and .zip files under release-artifacts/
          files: release-artifacts/**/*.{tar.gz,zip}
          fail_on_unmatched_files: false
