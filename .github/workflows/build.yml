name: Build All Platforms

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub Release after build'
        type: boolean
        default: false

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - label:        win32-x64
            runner:       windows-latest
            artifact:     phobos-win32-x64
            pack:         zip
            build-full-target: win32-x64
          - label:        darwin-arm64
            runner:       macos-14
            artifact:     phobos-darwin-arm64
            pack:         tar
            build-full-target: darwin-arm64

          - label:        linux-x64
            runner:       ubuntu-latest
            artifact:     phobos-linux-x64
            pack:         tar
            build-full-target: linux-x64

          - label:        linux-arm64
            runner:       ubuntu-24.04-arm
            artifact:     phobos-linux-arm64
            pack:         tar
            build-llama:  linux-arm64
            build-full-target: linux-arm64


    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Restore distutils (macOS)
        if: runner.os == 'macOS'
        run: pip3 install setuptools --break-system-packages

      - name: Install dependencies
        run: npm ci --foreground-scripts

      - name: Read version
        id: version
        run: |
          VERSION=$(node -e "const fs=require('fs'); const m=fs.readFileSync('version.ts','utf8').match(/CORE_VERSION\s*=\s*'([^']+)'/); console.log('CORE_VERSION='+m[1]);")
          echo "$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Read pinned binary versions from manifest
        id: pins
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('scripts/bin-manifest.json', 'utf8'));
            const t = '${{ matrix.build-full-target }}';
            const llama = m[t]?.llama || '';
            const sd = m[t]?.sd || '';
            console.log('LLAMA_VERSION=' + llama);
            console.log('SD_VERSION=' + sd);
            if (llama) console.error('📌 Pinned llama.cpp: ' + llama);
            else       console.error('⚠️  No pinned llama.cpp version — will fetch latest');
            if (sd)    console.error('📌 Pinned sd.cpp: ' + sd);
            else       console.error('⚠️  No pinned sd.cpp version — will fetch latest');
          " >> $GITHUB_OUTPUT
        shell: bash

      - name: Build llama-server from source (linux-arm64 — for phobos-lite)
        # phobos-lite bundles llama-server. linux-arm64 has no release binary
        # so we build from source and stage it into bin/ for build-lite.js.
        # phobos-core does NOT use this — DepPrep installs llama-server at first boot.
        if: matrix.build-llama == 'linux-arm64'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake build-essential ninja-build libgomp1
          git clone --depth 1 https://github.com/ggml-org/llama.cpp llama-src
          cmake -B llama-src/build llama-src \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLAMA_BUILD_TESTS=OFF \
            -DGGML_RPC=ON \
            -DGGML_OPENMP=OFF \
            -DCMAKE_INSTALL_RPATH='$ORIGIN' \
            -DCMAKE_C_FLAGS='-march=armv8-a+crc' \
            -DCMAKE_CXX_FLAGS='-march=armv8-a+crc'
          cmake --build llama-src/build --config Release -j$(nproc)
          mkdir -p bin
          cp llama-src/build/bin/llama-server bin/llama-server-linux-arm64
          # Copy all .so files from anywhere in the build tree (handles varied cmake output layouts)
          find llama-src/build -name '*.so' -o -name '*.so.*' | while read f; do
            # Skip symlinks — copy only real files, then recreate symlinks after
            if [ ! -L "$f" ]; then cp "$f" bin/; fi
          done
          # Recreate symlinks in bin/ so dlopen short names resolve correctly
          find llama-src/build -name '*.so.*' -type l | while read lnk; do
            base=$(basename "$lnk")
            target=$(readlink "$lnk")
            target_base=$(basename "$target")
            if [ -f "bin/$target_base" ] && [ ! -e "bin/$base" ]; then
              ln -s "$target_base" "bin/$base"
            fi
          done
          chmod +x bin/llama-server-linux-arm64

      - name: Build phobos-core
        run: node build.js
        env:
          PHOBOS_LICENSE_SEED: ${{ secrets.PHOBOS_LICENSE_SEED }}

      - name: Build phobos-lite
        run: node scripts/build-lite.js ${{ matrix.build-full-target }}
        continue-on-error: true

      - name: Write version.txt
        run: echo "${{ steps.version.outputs.CORE_VERSION }}" > version.txt
        shell: bash

      - name: Package phobos-core (tar)
        if: matrix.pack == 'tar'
        run: tar -czf ${{ matrix.artifact }}-${{ steps.version.outputs.CORE_VERSION }}.tar.gz -C dist .

      - name: Package phobos-core (zip)
        if: matrix.pack == 'zip'
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath "${{ matrix.artifact }}-${{ steps.version.outputs.CORE_VERSION }}.zip"

      - name: Upload phobos-core artifact (tar)
        if: matrix.pack == 'tar'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}-${{ steps.version.outputs.CORE_VERSION }}
          path: ${{ matrix.artifact }}-${{ steps.version.outputs.CORE_VERSION }}.tar.gz
          retention-days: 7

      - name: Upload phobos-core artifact (zip)
        if: matrix.pack == 'zip'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}-${{ steps.version.outputs.CORE_VERSION }}
          path: ${{ matrix.artifact }}-${{ steps.version.outputs.CORE_VERSION }}.zip
          retention-days: 7

      - name: Upload version.txt
        uses: actions/upload-artifact@v6
        with:
          name: version-${{ matrix.label }}
          path: version.txt
          retention-days: 7

      - name: Upload phobos-lite artifact
        uses: actions/upload-artifact@v6
        if: hashFiles('dist-lite/*.zip') != ''
        with:
          name: phobos-lite-${{ matrix.build-full-target }}-${{ steps.version.outputs.CORE_VERSION }}
          path: dist-lite/*.zip
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (github.event_name == 'workflow_dispatch' && inputs.release))
    permissions:
      contents: write

    steps:
      - name: Download all available artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-artifacts
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ github.ref_name }}
          name:                   PHOBOS ${{ github.ref_name }}
          draft:                  false
          prerelease:             false
          generate_release_notes: true
          files:                  release-artifacts/**/*.{tar.gz,zip}
          fail_on_unmatched_files: false