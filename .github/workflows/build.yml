name: Build All Platforms

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub Release after build'
        type: boolean
        default: false

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - label:    win32-x64
            runner:   windows-latest
            artifact: phobos-win32-x64
            pack:     zip

          - label:    darwin-x64
            runner:   macos-14          # macos-14 = ARM but cross-compiles fine via Rosetta
            artifact: phobos-darwin-x64 # actual x64 binary built by Node SEA using process.execPath
            pack:     tar               # NOTE: if you need a true Intel binary, use a self-hosted runner

          - label:    darwin-arm64
            runner:   macos-14          # Apple Silicon (M1/M2/M3) — free on all plans
            artifact: phobos-darwin-arm64
            pack:     tar

          - label:    linux-x64
            runner:   ubuntu-latest
            artifact: phobos-linux-x64
            pack:     tar

          - label:    linux-arm64
            runner:   ubuntu-24.04-arm
            artifact: phobos-linux-arm64
            pack:     tar

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: node build.js

      - name: Package (tar)
        if: matrix.pack == 'tar'
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Package (zip)
        if: matrix.pack == 'zip'
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact (tar)
        if: matrix.pack == 'tar'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          retention-days: 7

      - name: Upload artifact (zip)
        if: matrix.pack == 'zip'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (github.event_name == 'workflow_dispatch' && inputs.release))
    permissions:
      contents: write

    steps:
      - name: Download all available artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ github.ref_name }}
          name:                   PHOBOS ${{ github.ref_name }}
          draft:                  false
          prerelease:             false
          generate_release_notes: true
          files:                  release-artifacts/**/*.{tar.gz,zip}
          fail_on_unmatched_files: false
