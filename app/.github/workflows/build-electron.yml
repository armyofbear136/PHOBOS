name: Build Electron (all platforms)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag — must match CLIENT_VERSION in src/version.ts'
        required: true
        type: string

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label:  win-x64
            runner: windows-latest
            cmd:    electron:build:win

          - label:  linux-x64
            runner: ubuntu-latest
            cmd:    electron:build:linux

          - label:  macOS-arm64
            runner: macos-14
            cmd:    electron:build:mac

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: npm ci

      - name: Sync version from version.ts into package.json
        run: |
          VERSION=$(node -e "const fs=require('fs'); const m=fs.readFileSync('src/version.ts','utf8').match(/CLIENT_VERSION\s*=\s*'([^']+)'/); console.log(m[1]);")
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version='$VERSION'; fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
          echo "Synced version: $VERSION"
        shell: bash

      - name: Build
        run: npm run ${{ matrix.cmd }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: phobos-electron-${{ matrix.label }}
          path: |
            electron-dist/*.exe
            electron-dist/*.AppImage
            electron-dist/*.dmg
          if-no-files-found: error
          retention-days: 14

  collect:
    name: Collect all builds
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all
        continue-on-error: true

      - name: Flatten into single directory
        run: |
          mkdir -p flat
          find dist-all -type f \( -name "*.exe" -o -name "*.AppImage" -o -name "*.dmg" \) -exec cp {} flat/ \;
          echo "=== Built artifacts ==="
          ls -lh flat/
        shell: bash

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: phobos-electron-all-${{ github.event.inputs.version }}
          path: flat/*
          if-no-files-found: warn
          retention-days: 30

